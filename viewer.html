<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ROMetrics Bone Viewer</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{display:flex;height:100vh;font-family:system-ui,Segoe UI,Roboto;background:#0f172a;color:#e5e7eb}
    #view{flex:1;}
    #panel{
      width:340px;padding:10px;
      background:#020617;border-left:1px solid #1f2937;
      overflow:auto;font-size:12px;
    }
    h2{font-size:14px;margin-bottom:4px;}
    #status{margin-bottom:8px;color:#a5b4fc;}
    pre{white-space:pre-wrap;}
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="view"></div>
  <div id="panel">
    <h2>Bone names</h2>
    <div id="status">Waiting…</div>
    <pre id="bones"></pre>
    <h2 style="margin-top:10px;">Morph targets (shapekeys)</h2>
    <pre id="shapes">Scanning…</pre>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const statusEl = document.getElementById("status");
    const bonesPre = document.getElementById("bones");
    const shapesPre = document.getElementById("shapes");
    const view = document.getElementById("view");

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    view.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f5f9);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 1.6, 3);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.4, 0);
    controls.update();

    // Lights
    scene.add(new THREE.HemisphereLight(0xffffff, 0x404040, 1.3));
    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(3, 5, 2);
    scene.add(dir);

    function onResize(){
      const w = window.innerWidth - 340;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", onResize);
    onResize();

    // === ROMetrics-style model path candidates ===
const MODEL_CANDIDATES = [
  window.ROMETRICS_MODEL_URL,        // if set globally
  "fmept.glb",                       // same folder as index.html
  new URL("./fmept.glb", document.baseURI).href
].filter(Boolean);


    const loader = new GLTFLoader();

    function tryNextModelUrl(index){
      if (index >= MODEL_CANDIDATES.length){
        statusEl.textContent = "❌ Could not load model from any candidate path.";
        return;
      }
      const url = MODEL_CANDIDATES[index];
      statusEl.textContent = "Loading: " + url;

loader.load(url, (gltf) => {
  const root = gltf.scene;
  scene.add(root);

  const bonesSet  = new Set();
  const shapesSet = new Set();

  root.traverse(obj => {
    // Bones
    if (obj.isSkinnedMesh && obj.skeleton){
      obj.skeleton.bones.forEach(b => bonesSet.add(b.name));
    }
    if (obj.isBone) bonesSet.add(obj.name);

    // Shapekeys / morph targets
    if (obj.morphTargetDictionary){
      Object.keys(obj.morphTargetDictionary).forEach(name => {
        shapesSet.add(name);
      });
    }
  });

  const bones  = Array.from(bonesSet).sort();
  const shapes = Array.from(shapesSet).sort();

  bonesPre.textContent  = bones.join("\n")  + "\n\nTotal bones: "  + bones.length;
  shapesPre.textContent = shapes.length
    ? shapes.join("\n") + "\n\nTotal morph targets: " + shapes.length
    : "None found.";

  statusEl.textContent = "✅ Loaded model. Bones + shapekeys listed.";
  console.log("Bones:", bones);
  console.log("Morph targets:", shapes);
}, undefined, (err) => {
  statusEl.textContent = "❌ Failed to load " + url;
  console.warn("Failed to load", url, err);
  tryNextModelUrl(index + 1);
});

    }

    tryNextModelUrl(0);

    function animate(){
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
